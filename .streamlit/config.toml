[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[theme]
base = "dark"
# Bloomberg-style layered blue palette
primaryColor            = "#4fc3f7"   # cyan-blue accent for buttons / highlights
backgroundColor         = "#0a1628"   # deepest navy — main canvas
secondaryBackgroundColor = "#142847"  # mid navy — sidebar, cards, inputs
textColor               = "#e8eef9"   # cool off-white

[browser]
gatherUsageStats = false
