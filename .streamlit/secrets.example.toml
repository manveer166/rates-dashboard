# Copy to secrets.toml locally, OR paste into:
#   • Streamlit Cloud:  Settings → Secrets
#   • Fly.io:           flyctl secrets set KEY=value
#   • GitHub Actions:   Settings → Secrets and variables → Actions

# ── Dashboard auth ─────────────────────────────────────────────────────
ADMIN_PASSWORD     = "your-admin-password"
VIEWER_PASSWORDS   = "pw1:Name1,pw2:Name2"     # password:label, comma-separated
AUTH_SECRET        = "any-random-string-here"   # HMAC key for query-param tokens

# Optional: page-specific passwords (each unlocks ONE page)
# Format:  "password:PageFileStem,password2:OtherPage"
# PAGE_PASSWORDS   = "vol:07_Vol_Surface,scanner:06_Analysis"

# ── Public URL the dashboard runs at ───────────────────────────────────
# Used in every UTM-tagged deep link in briefs / weekly PDF
DASHBOARD_URL      = "https://your-app.streamlit.app"

# Optional: Cloudflare Worker for CTA click tracking
# CTA_TRACKER_URL  = "https://cta.macromanv.com"

# ── Data API keys (mostly optional) ─────────────────────────────────────
FRED_API_KEY       = "your_32char_fred_key"
# Optional — OpenBB providers that need a key
# fmp_api_key             = ""    # sovereign CDS, paid yield curves
# tradingeconomics_key    = ""    # sovereign yields, calendar
# bls_api_key             = ""    # full BLS series (JOLTS already via FRED)
# intrinio_api_key        = ""
# tiingo_api_key          = ""

# Optional: EODHD financial data (for international yields)
# EODHD_API_TOKEN    = ""

# ── AI drafter (Anthropic) ──────────────────────────────────────────────
# ANTHROPIC_API_KEY = "sk-ant-..."

# ── Email alerts (Gmail SMTP) ──────────────────────────────────────────
# Use a Gmail App Password (NOT your account password):
#   myaccount.google.com → Security → 2-Step Verification → App passwords
GMAIL_USER         = "you@gmail.com"
GMAIL_APP_PASSWORD = "16-char-app-password"

# ── Optional: analytics ────────────────────────────────────────────────
# GA_MEASUREMENT_ID  = "G-XXXXXXXXXX"
# ADSENSE_CLIENT     = "ca-pub-XXXXXXXXXXXXXXXX"

# ── Optional: Google Sheets subscriber backend ─────────────────────────
# GOOGLE_SHEETS_CREDENTIALS = "/path/to/service-account.json"
# SUBSCRIBERS_SHEET_ID      = "your-sheet-id"
