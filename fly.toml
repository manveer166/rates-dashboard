# Fly.io config — `flyctl launch --copy-config` will use this as-is.
# Override app name with: flyctl launch --name <your-name>

app = "macromanv-dashboard"
primary_region = "lhr"          # London (change to "ewr" for US east, "iad" Virginia, "sjc" SF)

[build]
  dockerfile = "Dockerfile"

[env]
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"
  PYTHONUNBUFFERED = "1"

[mounts]
  source = "dashboard_cache"
  destination = "/app/data/cache"
  # Create with: flyctl volumes create dashboard_cache --size 1 --region lhr

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"   # idle machines hibernate (free tier friendly)
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/_stcore/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
